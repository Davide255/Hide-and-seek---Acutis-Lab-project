<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <title>Hide &amp; Seek</title>
  <style>
    @keyframes tick { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }
    .timer-tick { animation: tick 1s ease-in-out infinite; }
    html, body { height: 100%; }
  </style>
  <link rel="stylesheet" href="gay.css" />
</head>

<body>

  <!-- Toast -->
  <div id="toast">
    <div id="toast-inner"></div>
  </div>

  <!-- ════════════════════════════════════════════════════════════
       SCREEN: Connecting
       ════════════════════════════════════════════════════════════ -->
  <div id="screen-connecting">
    <div></div>
    <p id="conn-label">Connecting…</p>
    <p>First wake-up may take ~30 s</p>
  </div>

  <!-- ════════════════════════════════════════════════════════════
       SCREEN: Lobby
       ════════════════════════════════════════════════════════════ -->
  <div id="screen-lobby">

    <div>
      <h2>Lobby</h2>
      <button onclick="leaveRoom()">Leave</button>
    </div>

    <div>
      <p>Room code — share with friends</p>
      <div id="lob-code">——</div>
      <button onclick="copyCode()">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/>
        </svg>
        <span id="copy-label">Tap to copy</span>
      </button>
    </div>

    <div>
      <p>
        Players (<span id="lob-count">0</span>)
      </p>
      <div id="lob-players"></div>
    </div>

    <div id="lob-master-ctrl">
      <p id="lob-need-more">Need at least 2 players to start</p>
      <button id="btn-start" onclick="startGame()" disabled>
        Start Game
      </button>
    </div>
    <p id="lob-waiting">
      Waiting for the master to start…
    </p>
  </div>

  <!-- ════════════════════════════════════════════════════════════
       SCREEN: Hiding countdown
       ════════════════════════════════════════════════════════════ -->
  <div id="screen-hiding">
    <div>
      <div id="hid-emoji">🏃</div>
      <h2 id="hid-headline">HIDE NOW!</h2>
      <p id="hid-sub"></p>
    </div>
    <div>
      <div></div>
      <div></div>
      <span id="hid-timer">20</span>
    </div>
    <p>Game starts when timer hits zero</p>
  </div>

  <!-- ════════════════════════════════════════════════════════════
       SCREEN: Active game
       ════════════════════════════════════════════════════════════ -->
  <div id="screen-active">

    <div>
      <div>
        <h2 id="act-headline"></h2>
        <p id="act-sub"></p>
      </div>
      <div id="act-badge"></div>
    </div>

    <!-- Seeker panel -->
    <div id="seeker-panel">
      <p>Players to find</p>
      <div id="seeker-list"></div>
    </div>

    <!-- Hider panel -->
    <div id="hider-panel">
      <div id="hider-card">
        <div id="hider-card-emoji">🤫</div>
        <h3 id="hider-card-title"></h3>
        <p id="hider-card-desc"></p>
      </div>
      <div>
        <p>Live leaderboard</p>
        <div id="hider-lb"></div>
      </div>
    </div>

    <div id="act-master-ctrl">
      <button onclick="endGame()">
        End Game Early
      </button>
    </div>
  </div>

  <!-- ════════════════════════════════════════════════════════════
       SCREEN: Game over
       ════════════════════════════════════════════════════════════ -->
  <div id="screen-over">
    <div>
      <div>🏆</div>
      <h2>Game Over!</h2>
      <p>Final standings</p>
    </div>
    <div id="over-lb"></div>
    <div>
      <div id="over-master-ctrl">
        <button onclick="resetGame()">
          Play Again
        </button>
      </div>
      <button onclick="leaveRoom()">
        Leave Room
      </button>
    </div>
  </div>

  <script src="https://hide-and-seek-acutis-lab-project.onrender.com/socket.io/socket.io.js"></script>
  <script>
  (() => {
    const BACKEND = 'https://hide-and-seek-acutis-lab-project.onrender.com';

    // ── Read URL params ───────────────────────────────────────────────────────
    const params  = new URLSearchParams(location.search);
    const action  = params.get('action');
    const myName  = decodeURIComponent(params.get('name')  || '');
    const pRoomId = decodeURIComponent(params.get('roomId')|| '').toUpperCase();

    if (!action || !myName) {
      location.href = 'join.html';
    }

    // ── State ─────────────────────────────────────────────────────────────────
    let socket   = null;
    let myId     = null;
    let roomId   = null;
    let room     = null;
    let isMaster = false;

    // ── Screens ───────────────────────────────────────────────────────────────
    const SCREENS = ['connecting','lobby','hiding','active','over'];
    function show(name) {
      SCREENS.forEach(s => {
        const el = document.getElementById('screen-' + s);
        el.classList.toggle('hidden', s !== name);
        el.classList.toggle('flex',   s === name);
      });
    }

    // ── Toast ─────────────────────────────────────────────────────────────────
    let toastTimer;
    function toast(msg, type = 'error') {
      const wrap  = document.getElementById('toast');
      const inner = document.getElementById('toast-inner');
      inner.className = (type === 'ok' ? 'bg-green-600' : 'bg-red-500') +
        ' text-white px-4 py-2.5 rounded-xl shadow-xl text-sm font-semibold max-w-xs text-center';
      inner.textContent = msg;
      wrap.classList.replace('opacity-0','opacity-100');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => wrap.classList.replace('opacity-100','opacity-0'), 3000);
    }

    // ── Helpers ───────────────────────────────────────────────────────────────
    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function avatar(name) {
      return `<div>
                ${esc(name[0].toUpperCase())}</div>`;
    }
    const MEDALS = ['🥇','🥈','🥉'];

    // ── Render: lobby ─────────────────────────────────────────────────────────
    function renderLobby() {
      if (!room) return;
      document.getElementById('lob-code').textContent  = room.id;
      document.getElementById('lob-count').textContent = room.players.length;

      document.getElementById('lob-players').innerHTML = room.players.map(p => {
        const tags = [];
        if (p.role === 'master') tags.push('<span>master</span>');
        if (p.id === myId)       tags.push('<span>you</span>');
        return `
          <div>
            ${avatar(p.name)}
            <span>${esc(p.name)}</span>
            <div>${tags.join('')}</div>
          </div>`;
      }).join('');

      const canStart = room.players.length >= 2;
      document.getElementById('lob-master-ctrl').classList.toggle('hidden', !isMaster);
      document.getElementById('lob-waiting').classList.toggle('hidden', isMaster);
      document.getElementById('lob-need-more').classList.toggle('hidden', canStart);
      document.getElementById('btn-start').disabled = !canStart;
    }

    // ── Render: active game ───────────────────────────────────────────────────
    function renderActive() {
      if (!room) return;
      const amSeeker = room.seekerId === myId;
      const me       = room.players.find(p => p.id === myId);
      const badge    = document.getElementById('act-badge');

      if (amSeeker) {
        document.getElementById('act-headline').textContent = 'SEEK! 🔍';
        document.getElementById('act-sub').textContent      = 'Tag all the hiders to win';
        badge.textContent = 'Seeker';
        badge.className   = 'shrink-0 px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider mt-1 bg-red-500/20 text-red-400';
      } else {
        const caught = me?.status === 'caught';
        document.getElementById('act-headline').textContent = caught ? 'CAUGHT! 😵'  : 'HIDE! 🤫';
        document.getElementById('act-sub').textContent      = caught ? "You've been found" : 'Stay out of sight!';
        badge.textContent = caught ? 'Caught' : 'Hiding';
        badge.className   = `shrink-0 px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider mt-1 ${
          caught ? 'bg-red-500/20 text-red-400' : 'bg-green-500/20 text-green-400'}`;
      }

      document.getElementById('seeker-panel').classList.toggle('hidden', !amSeeker);
      document.getElementById('hider-panel').classList.toggle('hidden',  amSeeker);
      document.getElementById('act-master-ctrl').classList.toggle('hidden', !isMaster);

      if (amSeeker) {
        const hiders = room.players.filter(p => p.id !== myId);
        document.getElementById('seeker-list').innerHTML = hiders.map(p => {
          const caught = p.status === 'caught';
          return `
            <div>
              ${avatar(p.name)}
              <span>${esc(p.name)}</span>
              <span>${caught ? '😵' : '🙈'}</span>
              ${caught
                ? '<span>Caught</span>'
                : `<button onclick="tagPlayer('${p.id}')">Tag!</button>`}
            </div>`;
        }).join('') || '<p>All players caught!</p>';
      } else {
        const caught = me?.status === 'caught';
        document.getElementById('hider-card').className = caught
          ? 'rounded-2xl p-6 text-center border bg-red-900/20 border-red-500/30'
          : 'rounded-2xl p-6 text-center border bg-green-900/20 border-green-500/30';
        document.getElementById('hider-card-emoji').textContent = caught ? '😵' : '🤫';
        document.getElementById('hider-card-title').textContent = caught ? "You've been caught!" : 'Stay hidden!';
        document.getElementById('hider-card-desc').textContent  = caught
          ? 'Sit tight — watch the leaderboard'
          : "Don't let the seeker find you";
        document.getElementById('hider-lb').innerHTML = renderLeaderboard(room.leaderboard);
      }
    }

    function renderLeaderboard(lb) {
      return lb.map((p, i) => `
        <div>
          <span>${MEDALS[i] ?? `${i+1}.`}</span>
          ${avatar(p.name)}
          <span>
            ${esc(p.name)}${p.id === myId
              ? ' <span>(you)</span>' : ''}
          </span>
          <span>${p.score} pts</span>
        </div>`).join('');
    }

    // ── Socket setup ──────────────────────────────────────────────────────────
    document.getElementById('conn-label').textContent =
      action === 'create' ? 'Creating room…' : 'Joining room…';

    socket = io(BACKEND, { transports: ['websocket', 'polling'] });

    socket.on('connect', () => {
      myId = socket.id;
      if (action === 'create') {
        socket.emit('create_room', { name: myName });
      } else {
        socket.emit('join_room', { roomId: pRoomId, name: myName });
      }
    });

    socket.on('connect_error', () => {
      toast('Cannot reach server — it may be waking up, please wait.');
    });

    // ── BUG FIX: roomId was never assigned for joining players,
    //    causing `tag`, `start_game`, etc. to send roomId=null → "Room not found"
    socket.on('error', ({ message }) => {
      toast(message);
      if (document.getElementById('screen-connecting').classList.contains('flex')) {
        setTimeout(() => {
          location.href = `join.html?error=${encodeURIComponent(message)}`;
        }, 1500);
      }
    });

    socket.on('room_created', ({ roomId: id, room: r }) => {
      roomId = id; room = r; isMaster = true;
      renderLobby(); show('lobby');
    });

    socket.on('room_joined', ({ room: r }) => {
      roomId = r.id; room = r; isMaster = false;  // ← bug fix: roomId was missing here
      renderLobby(); show('lobby');
    });

    socket.on('player_joined', ({ room: r }) => {
      room = r; renderLobby();
      toast(`${r.players.at(-1)?.name ?? 'Someone'} joined`, 'ok');
    });

    socket.on('player_left', ({ playerName, room: r }) => {
      room = r;
      isMaster = room.masterId === myId;
      toast(`${playerName} left`);
      const cur = document.querySelector('[id^="screen-"]:not(.hidden)')?.id;
      if (cur === 'screen-lobby')  renderLobby();
      if (cur === 'screen-active') renderActive();
    });

    socket.on('hiding_started', ({ seekerId, hideTime, room: r }) => {
      room = r;
      const amSeeker = seekerId === myId;
      const seeker   = r.players.find(p => p.id === seekerId);
      document.getElementById('hid-emoji').textContent    = amSeeker ? '🔍' : '🏃';
      document.getElementById('hid-headline').textContent = amSeeker ? 'YOU ARE THE SEEKER!' : 'HIDE NOW!';
      document.getElementById('hid-sub').textContent      = amSeeker
        ? 'Wait for the countdown, then go find everyone!'
        : `${seeker ? esc(seeker.name) : 'Someone'} is the seeker — find your best spot!`;
      document.getElementById('hid-timer').textContent = hideTime;
      show('hiding');
    });

    socket.on('countdown', ({ timeRemaining }) => {
      document.getElementById('hid-timer').textContent = timeRemaining;
    });

    socket.on('game_active', ({ room: r }) => {
      room = r; renderActive(); show('active');
    });

    socket.on('player_tagged', ({ targetName, room: r }) => {
      room = r;
      toast(`${targetName} was caught! 😵`);
      renderActive();
    });

    socket.on('game_over', ({ room: r, leaderboard }) => {
      room = { ...r, leaderboard };
      document.getElementById('over-lb').innerHTML = renderLeaderboard(leaderboard);
      document.getElementById('over-master-ctrl').classList.toggle('hidden', !isMaster);
      show('over');
    });

    socket.on('game_reset', ({ room: r }) => {
      room = r; renderLobby(); show('lobby');
    });

    // ── Actions ───────────────────────────────────────────────────────────────
    window.startGame  = () => socket.emit('start_game', { roomId });
    window.tagPlayer  = (targetId) => socket.emit('tag', { roomId, targetId });
    window.endGame    = () => { if (confirm('End the game now?')) socket.emit('end_game', { roomId }); };
    window.resetGame  = () => socket.emit('reset_game', { roomId });

    window.leaveRoom  = () => {
      socket.disconnect();
      location.href = 'join.html';
    };

    window.copyCode = () => {
      navigator.clipboard?.writeText(roomId).then(() => {
        const lbl = document.getElementById('copy-label');
        lbl.textContent = '✓ Copied!';
        setTimeout(() => lbl.textContent = 'Tap to copy', 2000);
      });
    };

  })();
  </script>
</body>
</html>
